name: Build Windows exe

# Builds prior.exe on a clean Windows runner (where pkg can fetch its base
# Node binary normally) and attaches it to the release. Runs automatically
# when a release is published, or manually for a given tag.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach prior.exe to (e.g. v1.7.14)'
        required: true

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build prior.exe
        run: npx --yes @yao-pkg/pkg . --targets node20-win-x64 --output prior-build/prior.exe

      - name: Attach prior.exe to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: gh release upload "$env:TAG" prior-build/prior.exe --clobber
